{% extends "base.html" %}
{% block title %}Perfil{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Perfil</h1>
<div class="row">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post">
          {{ form.hidden_tag() }}
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" value="{{ current_user.email }}" disabled>
          </div>
          <div class="mb-3">{{ form.display_name.label(class="form-label") }}{{ form.display_name(class="form-control") }}</div>
          {{ form.submit(class="btn btn-primary") }}
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
